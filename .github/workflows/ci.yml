name: RAG evenement

on:
  push:
    branches: [master, develop]
    tags:
      - "v*.*"
  pull_request:
    branches: [master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Installation de Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Installation de Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          activate-environment: chap9rag
          environment-file: environment.yml
          python-version: "3.10"
          auto-activate-base: false
          use-mamba: true          # plus rapide
          cache-env: true
          cache-env-key: conda-${{ hashFiles('environment.yml') }}

      - name: Mise à jour des dépendances pip
        shell: bash -el {0}
        run: pip install --upgrade "mistralai>=1.0.0" "instructor>=1.3.0"

      - name: Démarrage de l'API
        shell: bash -el {0}
        env:
            MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
            INDEX_PATH: ${{ github.workspace }}
        run: |
          uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          echo "Attente du démarrage de l'API..."
          for i in {1..30}; do
              curl -s http://localhost:8000/docs && break
              echo "Tentative $i/30..."
              sleep 2
          done

      - name: Tests fonctionnels
        shell: bash -el {0}
        env:
            MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }} 
        run: python test/api_tests.py

      - name: Évaluation qualité RAG
        shell: bash -el {0}
        env:
            MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python rag/evaluate_rag.py