name: RAG evenement

on:
  push:
    branches: [master, develop]
    tags:
      - "v*.*"
  pull_request:
    branches: [master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Installation de Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Installation de Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          activate-environment: chap9rag
          environment-file: environment.yml
          python-version: "3.10"
          auto-activate-base: false

      - name: Démarrage de l'API
        shell: bash -el {0}  # 👈 obligatoire pour activer conda
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Tests fonctionnels
        shell: bash -el {0}
        run: python test/api_tests.py

      - name: Évaluation qualité RAG
        shell: bash -el {0}
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python evaluate_rag.py